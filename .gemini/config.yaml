code_review:
  comment_severity_threshold: MEDIUM
  max_review_comments: 25
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - 'pnpm-lock.yaml'
  - 'dist/**'
  - 'out/**'
  - '*.tsbuildinfo'
  - '**/*.db'
  - '**/*.sqlite'
  - 'keynote/**'
  - 'website/**'
  - 'docs/**'
  - '.gemini/**'
  - '.claude/**'
  - 'AGENTS.md'
  - 'CLAUDE.md'
