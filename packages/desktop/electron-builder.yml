appId: com.clawwork.app
productName: ClawWork
directories:
  buildResources: build
  output: dist
publish:
  provider: github
  owner: clawwork-ai
  repo: clawwork
extraResources:
  - from: build/icon.png
    to: icon.png

files:
  - 'out/**/*'
  - 'node_modules/**/*'
  - 'package.json'
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
afterPack: ./scripts/afterPack.cjs
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: ClawWork needs microphone access for voice dictation in chat input.
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: build/icon.png
  maintainer: samzong <samzong.lu@gmail.com>
  desktop:
    StartupWMClass: ClawWork
