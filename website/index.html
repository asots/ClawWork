<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ClawWork — Open source AI desktop client. Parallel tasks, visible tool activity, and files you can actually find later."
    />
    <title>ClawWork</title>
    <script>
      (function () {
        var q = location.search.slice(1);
        if (q && !q.includes('=')) {
          history.replaceState(null, '', location.pathname + q + location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
